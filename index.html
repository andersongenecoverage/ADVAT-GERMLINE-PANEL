<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical Gene Panel Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            clinic: {
              50: '#ecfeff', 100: '#cffafe', 500: '#06b6d4', 600: '#0891b2', 700: '#0e7490', 900: '#164e63'
            }
          },
          boxShadow: { soft: '0 18px 45px rgba(15, 23, 42, 0.08)' }
        }
      }
    };
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #67e8f9 transparent; }
    .gene-chip:focus-visible, button:focus-visible, input:focus-visible { outline: 3px solid rgba(6, 182, 212, .45); outline-offset: 2px; }
    .table-wrap table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .table-wrap th { background: #e0f7fa; color: #155e75; font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; }
    .dark .table-wrap th { background: rgba(8, 145, 178, .18); color: #a5f3fc; }
    .table-wrap th, .table-wrap td { border-bottom: 1px solid rgba(148, 163, 184, .28); padding: .85rem 1rem; vertical-align: top; }
    .table-wrap tr:hover td { background: rgba(236, 254, 255, .7); }
    .dark .table-wrap tr:hover td { background: rgba(15, 23, 42, .72); }
    @media (max-width: 760px) {
      .responsive-table thead { display: none; }
      .responsive-table, .responsive-table tbody, .responsive-table tr, .responsive-table td { display: block; width: 100%; }
      .responsive-table tr { border-bottom: 1px solid rgba(148, 163, 184, .35); padding: .75rem 0; }
      .responsive-table td { border: 0; padding: .35rem 1rem; }
      .responsive-table td::before { content: attr(data-label); display: block; margin-bottom: .2rem; font-size: .68rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: #0891b2; }
    }
    .copy-toast { animation: fadeInOut 1.5s ease forwards; }
    @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(6px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-6px); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden rounded-xl bg-slate-900 px-4 py-3 text-sm font-bold text-white shadow-lg dark:bg-white dark:text-slate-900"></div>
  <div class="min-h-screen">
    <header class="sticky top-0 z-40 border-b border-cyan-100/80 bg-white/92 backdrop-blur dark:border-slate-800 dark:bg-slate-950/90">
      <div class="flex min-h-16 items-center gap-3 px-4 sm:px-6 lg:px-8">
        <button id="mobileMenu" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-cyan-100 text-cyan-700 lg:hidden dark:border-slate-700 dark:text-cyan-200" aria-label="Open organ navigation">
          <span class="text-sm font-bold leading-none">Menu</span>
        </button>
        <div class="flex items-center gap-3 min-w-0">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-gradient-to-br from-cyan-500 to-teal-500 text-sm font-black text-white shadow-soft">AD</div>
          <div class="min-w-0">
            <h1 class="truncate text-base font-bold text-slate-950 sm:text-xl dark:text-white">ADVAT GERMLINE PANEL</h1>
          </div>
        </div>
        <div class="ml-auto flex flex-1 items-center justify-end gap-3">
          <label class="relative hidden w-full max-w-xl md:block">
            <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-cyan-700 dark:text-cyan-300">Search</span>
            <input id="globalSearch" type="search" placeholder="Search organs, diseases, genes, methods..." class="h-11 w-full rounded-xl border border-cyan-100 bg-cyan-50/60 pl-16 pr-4 text-sm text-slate-900 placeholder:text-slate-400 transition focus:border-cyan-400 focus:bg-white dark:border-slate-700 dark:bg-slate-900 dark:text-white dark:focus:border-cyan-400" />
          </label>
          <button id="darkToggle" class="inline-flex h-10 items-center gap-2 rounded-xl border border-cyan-100 px-3 text-sm font-semibold text-slate-700 transition hover:border-cyan-300 hover:text-cyan-700 dark:border-slate-700 dark:text-slate-200 dark:hover:text-cyan-200" aria-label="Toggle dark mode">
            <span id="darkIcon">Theme</span>
          </button>
        </div>
      </div>
      <div class="border-t border-cyan-100 px-4 py-3 md:hidden dark:border-slate-800">
        <input id="mobileSearch" type="search" placeholder="Search organs, diseases, genes, methods..." class="h-11 w-full rounded-xl border border-cyan-100 bg-cyan-50/60 px-4 text-sm dark:border-slate-700 dark:bg-slate-900" />
      </div>
    </header>

    <div class="grid lg:grid-cols-[280px_360px_minmax(0,1fr)]">
      <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 -translate-x-full overflow-y-auto border-r border-cyan-100 bg-white p-4 pt-20 transition lg:sticky lg:top-16 lg:z-20 lg:h-[calc(100vh-4rem)] lg:w-auto lg:translate-x-0 lg:pt-4 dark:border-slate-800 dark:bg-slate-950">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[.18em] text-cyan-700 dark:text-cyan-300">Organs</p>
            <p id="organCount" class="text-sm text-slate-500 dark:text-slate-400"></p>
          </div>
          <button id="closeSidebar" class="rounded-lg border border-cyan-100 px-3 py-2 text-sm lg:hidden dark:border-slate-700">Close</button>
        </div>
        <nav id="organList" class="space-y-2" aria-label="Organs"></nav>
      </aside>

      <section class="border-r border-cyan-100 bg-white/70 p-4 lg:sticky lg:top-16 lg:h-[calc(100vh-4rem)] lg:overflow-y-auto dark:border-slate-800 dark:bg-slate-950/55">
        <div class="mb-4 rounded-2xl border border-cyan-100 bg-gradient-to-br from-cyan-50 to-teal-50 p-4 dark:border-slate-800 dark:from-slate-900 dark:to-slate-900">
          <p class="text-xs font-bold uppercase tracking-[.18em] text-cyan-700 dark:text-cyan-300">Selected Organ</p>
          <h2 id="selectedOrganTitle" class="mt-1 text-xl font-bold"></h2>
          <p id="selectedOrganMeta" class="mt-1 text-sm text-slate-600 dark:text-slate-400"></p>
        </div>
        <div class="mb-3 flex items-center justify-between gap-3">
          <h3 class="text-sm font-bold uppercase tracking-[.16em] text-slate-500 dark:text-slate-400">Panels</h3>
          <span id="diseaseCount" class="rounded-full bg-cyan-100 px-3 py-1 text-xs font-bold text-cyan-800 dark:bg-cyan-500/15 dark:text-cyan-200"></span>
        </div>
        <div id="diseaseList" class="space-y-2"></div>
      </section>

      <main class="min-w-0 p-4 sm:p-6 lg:p-8">
        <nav class="mb-5 flex flex-wrap items-center gap-2 text-sm text-slate-500 dark:text-slate-400" aria-label="Breadcrumb">
          <button class="font-semibold text-cyan-700 hover:text-cyan-900 dark:text-cyan-300" data-reset>Dashboard</button>
          <span>/</span><span id="crumbOrgan"></span><span>/</span><span id="crumbDisease" class="font-semibold text-slate-800 dark:text-slate-100"></span>
        </nav>

        <section class="mb-6 rounded-2xl border border-cyan-100 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex flex-col gap-1 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <p class="text-xs font-bold uppercase tracking-[.18em] text-cyan-700 dark:text-cyan-300"></p>
              <h2 class="mt-1 text-xl font-bold">Fertility Panels</h2>
            </div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Jump to reproductive and fertility gene panels.</p>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            <button type="button" class="group rounded-xl border border-cyan-100 bg-cyan-50/70 p-4 text-left transition hover:border-cyan-300 hover:bg-cyan-100/70 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-cyan-700" onclick="setSelection('reproductive','reproductive-male-infertility')">
              <p class="text-xs font-bold uppercase tracking-[.16em] text-cyan-700 dark:text-cyan-300">Male</p>
              <h3 class="mt-2 text-base font-bold text-slate-900 dark:text-white">Male Infertility Gene Panel</h3>
              <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">1,108 genes - Exome sequencing</p>
            </button>
            <button type="button" class="group rounded-xl border border-cyan-100 bg-cyan-50/70 p-4 text-left transition hover:border-cyan-300 hover:bg-cyan-100/70 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-cyan-700" onclick="setSelection('reproductive','reproductive-male-polymorphism')">
              <p class="text-xs font-bold uppercase tracking-[.16em] text-cyan-700 dark:text-cyan-300">Male</p>
              <h3 class="mt-2 text-base font-bold text-slate-900 dark:text-white">Male Polymorphism Genes</h3>
              <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">115 genes - Exome sequencing</p>
            </button>
            <button type="button" class="group rounded-xl border border-cyan-100 bg-cyan-50/70 p-4 text-left transition hover:border-cyan-300 hover:bg-cyan-100/70 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-cyan-700" onclick="setSelection('reproductive','reproductive-female-infertility')">
              <p class="text-xs font-bold uppercase tracking-[.16em] text-cyan-700 dark:text-cyan-300">Female</p>
              <h3 class="mt-2 text-base font-bold text-slate-900 dark:text-white">Female Infertility Gene Panel</h3>
              <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">844 genes - Exome sequencing</p>
            </button>
            <button type="button" class="group rounded-xl border border-cyan-100 bg-cyan-50/70 p-4 text-left transition hover:border-cyan-300 hover:bg-cyan-100/70 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-cyan-700" onclick="setSelection('reproductive','reproductive-female-polymorphism')">
              <p class="text-xs font-bold uppercase tracking-[.16em] text-cyan-700 dark:text-cyan-300">Female</p>
              <h3 class="mt-2 text-base font-bold text-slate-900 dark:text-white">Female Polymorphism Genes</h3>
              <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">30 genes - Exome sequencing</p>
            </button>
          </div>
        </section>

        <section class="rounded-2xl border border-cyan-100 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
            <div class="min-w-0">
              <p class="text-xs font-bold uppercase tracking-[.18em] text-cyan-700 dark:text-cyan-300">Disease Details</p>
              <h2 id="detailTitle" class="mt-2 text-2xl font-bold tracking-tight text-slate-950 dark:text-white"></h2>
              <p id="detailMethod" class="mt-2 text-sm text-slate-600 dark:text-slate-400"></p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="copyDisease" class="rounded-xl bg-cyan-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-cyan-700">Copy panel name</button>
              <button id="copyGenes" class="rounded-xl border border-cyan-200 px-4 py-2 text-sm font-bold text-cyan-800 transition hover:border-cyan-400 dark:border-cyan-800 dark:text-cyan-200">Copy genes</button>
              <button id="downloadGenes" class="rounded-xl border border-cyan-200 px-4 py-2 text-sm font-bold text-cyan-800 transition hover:border-cyan-400 dark:border-slate-800 dark:text-cyan-200">Download CSV</button>
            </div>
          </div>

          <div class="mt-6 grid gap-4 sm:grid-cols-3">
            <div class="rounded-xl border border-cyan-100 bg-cyan-50 p-4 dark:border-slate-800 dark:bg-slate-950"><p class="text-xs font-bold uppercase text-cyan-700 dark:text-cyan-300">Organs</p><p id="statOrgans" class="mt-1 text-2xl font-black"></p></div>
            <div class="rounded-xl border border-cyan-100 bg-cyan-50 p-4 dark:border-slate-800 dark:bg-slate-950"><p class="text-xs font-bold uppercase text-cyan-700 dark:text-cyan-300">Panels</p><p id="statDiseases" class="mt-1 text-2xl font-black"></p></div>
            <div class="rounded-xl border border-cyan-100 bg-cyan-50 p-4 dark:border-slate-800 dark:bg-slate-950"><p class="text-xs font-bold uppercase text-cyan-700 dark:text-cyan-300">Genes in View</p><p id="statGenes" class="mt-1 text-2xl font-black"></p></div>
          </div>

          <div class="mt-6">
            <div class="mb-3 flex items-center justify-between gap-3">
              <h3 class="text-sm font-bold uppercase tracking-[.16em] text-slate-500 dark:text-slate-400">Gene List</h3>
              <span id="copyNotice" class="text-sm font-semibold text-teal-600 opacity-0 transition dark:text-teal-300">Copied!</span>
            </div>
            <div id="geneChips" class="flex max-h-80 flex-wrap gap-2 overflow-y-auto rounded-xl border border-cyan-100 bg-slate-50 p-3 dark:border-slate-800 dark:bg-slate-950"></div>
          </div>

          <div class="mt-6 table-wrap overflow-hidden rounded-xl border border-cyan-100 dark:border-slate-800">
            <table class="responsive-table bg-white text-sm dark:bg-slate-900">
              <thead><tr><th>Panel</th><th>Genes</th><th>Method</th></tr></thead>
              <tbody id="detailTable"></tbody>
            </table>
          </div>
        </section>

        <section class="mt-6 rounded-2xl border border-cyan-100 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex flex-col gap-1 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <p class="text-xs font-bold uppercase tracking-[.18em] text-cyan-700 dark:text-cyan-300">Organ Table</p>
              <h2 id="organTableTitle" class="mt-1 text-xl font-bold"></h2>
            </div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Filtered by the current search.</p>
          </div>
          <div class="table-wrap max-h-[36rem] overflow-auto rounded-xl border border-cyan-100 dark:border-slate-800">
            <table class="responsive-table bg-white text-sm dark:bg-slate-900">
              <thead class="sticky top-0 z-10"><tr><th>Panel</th><th>Genes Involved</th><th>Method</th></tr></thead>
              <tbody id="organTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // ---------- Data & State ----------
    const DATA = JSON.parse(document.getElementById('dashboard-data').textContent);
    const state = { organId: DATA[0]?.id, diseaseId: DATA[0]?.diseases[0]?.id, query: '' };
    const $ = (id) => document.getElementById(id);

    // ---------- Utilities ----------
    const normalize = (v) => (v || '').toString().toLowerCase();
    const escapeHtml = (v) => (v || '').replace(/[&<>'"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    // Robust gene parser: handles commas, spaces, semicolons, newlines, trailing periods, duplicates
    const geneList = (text) => {
      if (!text || typeof text !== 'string') return [];
      const raw = text.replace(/[;\n]+/g, ',');
      const genes = raw.split(',').map(g => g.trim().replace(/\.$/, '').trim()).filter(Boolean);
      const seen = new Set();
      const unique = [];
      for (const g of genes) {
        const ug = g.toUpperCase();
        if (!seen.has(ug)) { seen.add(ug); unique.push(g); }
      }
      return unique;
    };

    const selectedOrgan = () => DATA.find(o => o.id === state.organId) || DATA[0];
    const selectedDisease = () => {
      const organ = selectedOrgan();
      return organ?.diseases.find(d => d.id === state.diseaseId) || organ?.diseases[0];
    };

    // Search across organ title, heading, disease name, genes, and method
    const matches = (organ, disease, query) => {
      if (!query) return true;
      const hay = normalize(organ.title + ' ' + organ.heading + ' ' + disease.name + ' ' + disease.genes + ' ' + disease.method);
      return hay.includes(query);
    };

    const filteredOrgans = () => {
      const q = state.query;
      return DATA.map(o => ({
        ...o,
        diseases: o.diseases.filter(d => matches(o, d, q))
      })).filter(o => o.diseases.length > 0 || normalize(o.title).includes(q) || normalize(o.heading).includes(q));
    };

    // ---------- Toast Notification ----------
    function showToast(message) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      toast.classList.add('copy-toast');
      setTimeout(() => {
        toast.classList.add('hidden');
        toast.classList.remove('copy-toast');
      }, 1500);
    }

    // ---------- Copy Text ----------
    function copyText(text, label) {
      const fallback = () => {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      };
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(fallback);
      } else {
        fallback();
      }
      // Show inline notice
      $('copyNotice').classList.remove('opacity-0');
      window.setTimeout(() => $('copyNotice').classList.add('opacity-0'), 1100);
      // Show toast
      showToast(label || 'Copied to clipboard!');
    }

    // ---------- CSV Download ----------
    function downloadGenesCsv(organ, disease) {
      const genes = geneList(disease?.genes || '');
      const header = ['Organ', 'Panel', 'Gene', 'Method'];
      const rows = genes.length
        ? genes.map(g => [organ.title, disease.name, g, disease.method || ''])
        : [[organ.title, disease.name, '', disease.method || '']];
      const escapeCell = (v) => `"${String(v || '').replace(/"/g, '""')}"`;
      const csv = [header, ...rows].map(r => r.map(escapeCell).join(',')).join('\n');
      const safeName = (disease.name || 'panel').replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 60);
      const fileName = `${organ.id}_${safeName}_genes.csv`;
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast(`Downloaded ${fileName}`);
    }

    // ---------- Navigation ----------
    function setSelection(organId, diseaseId) {
      state.organId = organId;
      const organ = selectedOrgan();
      state.diseaseId = diseaseId || organ.diseases[0]?.id;
      $('sidebar').classList.add('-translate-x-full');
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ---------- Rendering ----------
    function renderOrgans() {
      const groups = filteredOrgans();
      $('organCount').textContent = `${DATA.length} organs / ${DATA.reduce((s, o) => s + o.diseases.length, 0)} panels`;
      $('organList').innerHTML = groups.map(o => {
        const active = o.id === state.organId;
        return `<button class="w-full rounded-xl border px-3 py-3 text-left transition ${active ? 'border-cyan-400 bg-cyan-50 text-cyan-950 dark:border-cyan-500 dark:bg-cyan-500/15 dark:text-white' : 'border-transparent hover:border-cyan-100 hover:bg-cyan-50/70 dark:hover:border-slate-700 dark:hover:bg-slate-900'}" data-organ="${escapeHtml(o.id)}">
          <span class="block font-bold">${escapeHtml(o.title)}</span><span class="mt-1 block text-xs text-slate-500 dark:text-slate-400">${o.diseases.length} matching panels</span>
        </button>`;
      }).join('') || `<p class="rounded-xl border border-dashed border-cyan-200 p-4 text-sm text-slate-500 dark:border-slate-700">No organs match the search.</p>`;
      document.querySelectorAll('[data-organ]').forEach(btn => {
        btn.addEventListener('click', () => setSelection(btn.dataset.organ));
      });
    }

    function renderDiseases() {
      const organ = selectedOrgan();
      const diseases = organ.diseases.filter(d => matches(organ, d, state.query));
      $('selectedOrganTitle').textContent = organ.title;
      $('selectedOrganMeta').textContent = `${organ.heading} - Source: ${organ.source}`;
      $('diseaseCount').textContent = `${diseases.length} shown`;
      $('diseaseList').innerHTML = diseases.map(d => {
        const active = d.id === state.diseaseId;
        const gCount = geneList(d.genes).length;
        return `<button class="w-full rounded-xl border px-3 py-3 text-left transition ${active ? 'border-cyan-400 bg-cyan-50 dark:border-cyan-500 dark:bg-cyan-500/15' : 'border-slate-100 bg-white hover:border-cyan-200 hover:bg-cyan-50/60 dark:border-slate-800 dark:bg-slate-900 dark:hover:border-cyan-800'}" data-disease="${escapeHtml(d.id)}">
          <span class="block text-sm font-bold leading-snug">${escapeHtml(d.name)}</span><span class="mt-2 block text-xs text-slate-500 dark:text-slate-400">${gCount} genes - ${escapeHtml(d.method || 'Method not listed')}</span>
        </button>`;
      }).join('') || `<p class="rounded-xl border border-dashed border-cyan-200 p-4 text-sm text-slate-500 dark:border-slate-700">No panels match this search for ${escapeHtml(organ.title)}.</p>`;
      if (diseases.length && !diseases.some(d => d.id === state.diseaseId)) {
        state.diseaseId = diseases[0].id;
      }
      document.querySelectorAll('[data-disease]').forEach(btn => {
        btn.addEventListener('click', () => setSelection(state.organId, btn.dataset.disease));
      });
    }

    function rowHtml(d, clickable) {
      const genes = clickable
        ? geneList(d.genes).map(g => `<button class="gene-chip mr-1 mb-1 rounded-full bg-cyan-50 px-2 py-1 text-xs font-bold text-cyan-800 hover:bg-cyan-100 dark:bg-cyan-500/15 dark:text-cyan-100" data-copy="${escapeHtml(g)}" title="Copy ${escapeHtml(g)}">${escapeHtml(g)}</button>`).join('')
        : escapeHtml(d.genes);
      return `<tr><td data-label="Panel" class="font-semibold text-slate-900 dark:text-slate-100">${escapeHtml(d.name)}</td><td data-label="Genes">${genes}</td><td data-label="Method" class="text-slate-600 dark:text-slate-300">${escapeHtml(d.method || '-')}</td></tr>`;
    }

    function renderDetails() {
      const organ = selectedOrgan();
      const disease = selectedDisease();
      if (!organ || !disease) return;
      const genes = geneList(disease.genes);
      $('crumbOrgan').textContent = organ.title;
      $('crumbDisease').textContent = disease.name;
      $('detailTitle').textContent = disease.name;
      $('detailMethod').textContent = `Method: ${disease.method || 'Not listed'} - Source: ${organ.source}`;
      $('statOrgans').textContent = DATA.length;
      $('statDiseases').textContent = DATA.reduce((s, o) => s + o.diseases.length, 0);
      $('statGenes').textContent = genes.length;
      $('geneChips').innerHTML = genes.map(g =>
        `<button class="gene-chip rounded-full border border-cyan-200 bg-white px-3 py-1.5 text-sm font-bold text-cyan-800 transition hover:border-cyan-400 hover:bg-cyan-50 dark:border-cyan-800 dark:bg-slate-900 dark:text-cyan-100 dark:hover:bg-cyan-500/15" title="Copy ${escapeHtml(g)}" data-copy="${escapeHtml(g)}">${escapeHtml(g)}</button>`
      ).join('') || '<p class="text-sm text-slate-500">No genes listed.</p>';
      $('detailTable').innerHTML = rowHtml(disease, false);
      $('organTableTitle').textContent = `${organ.title} gene panels`;
      $('organTable').innerHTML = organ.diseases.filter(d => matches(organ, d, state.query)).map(d => rowHtml(d, true)).join('');

      // Attach copy handlers to all gene chips
      document.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', () => copyText(btn.dataset.copy, `Copied gene: ${btn.dataset.copy}`));
      });

      // Button handlers
      $('copyDisease').onclick = () => copyText(disease.name, 'Copied panel name');
      $('copyGenes').onclick = () => {
        const allGenes = geneList(disease.genes);
        copyText(allGenes.join('\n'), `Copied ${allGenes.length} genes`);
      };
      $('downloadGenes').onclick = () => downloadGenesCsv(organ, disease);
    }

    function render() { renderOrgans(); renderDiseases(); renderDetails(); }

    function updateSearch(value) {
      state.query = normalize(value).trim();
      const groups = filteredOrgans();
      if (groups.length && !groups.some(o => o.id === state.organId)) {
        state.organId = groups[0].id;
        state.diseaseId = groups[0].diseases[0]?.id;
      }
      render();
    }

    // ---------- Event Listeners ----------
    $('globalSearch').addEventListener('input', e => { $('mobileSearch').value = e.target.value; updateSearch(e.target.value); });
    $('mobileSearch').addEventListener('input', e => { $('globalSearch').value = e.target.value; updateSearch(e.target.value); });
    $('mobileMenu').addEventListener('click', () => $('sidebar').classList.remove('-translate-x-full'));
    $('closeSidebar').addEventListener('click', () => $('sidebar').classList.add('-translate-x-full'));
    document.querySelector('[data-reset]').addEventListener('click', () => {
      $('globalSearch').value = '';
      $('mobileSearch').value = '';
      state.query = '';
      setSelection(DATA[0].id, DATA[0].diseases[0].id);
    });
    $('darkToggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('medical-dashboard-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('medical-dashboard-theme') === 'dark' || (!localStorage.getItem('medical-dashboard-theme') && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    // ---------- Init ----------
    render();
  </script>
